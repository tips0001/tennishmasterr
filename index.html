    <meta charset="UTF-8">

    <style>
        /* Base Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000;
            /* Dark Grid Background Effect */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            /* Central Glow Effect */
            background: radial-gradient(circle at center, #1a1a00 0%, #000 80%);
            padding: 0px;
            border-radius: 25px;
        }

        /* Profile Section */
        .profile-wrapper {
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 4px solid #ccff00;
            box-shadow: 0 0 25px #ccff0066;
            object-fit: cover;
            background: #222; /* Placeholder color */
        }

        h1 {
            color: #ffcc00;
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .members-count {
            color: #ffcc00;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* Badges */
        .badge-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .badge {
            padding: 6px 16px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
        }

        .badge-elite { border: 1px solid #ffcc00; color: #ffcc00; }
        .badge-live { border: 1px solid #ff3300; color: #ff3300; }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .card {
            background: #0d0d0d;
            border: 1px solid #222;
            padding: 18px 5px;
            border-radius: 12px;
            transition: transform 0.3s;
        }

        .card:nth-child(2) { border-color: #ff444466; } /* Middle card highlight */

        .val { font-size: 20px; font-weight: 800; display: block; margin-bottom: 4px; }
        .yellow-text { color: #ffcc00; }
        .red-text { color: #ff4444; }
        .label { font-size: 12px; color: #888; text-transform: capitalize; }

        /* --- THE UNDER-BAHAR ANIMATED BUTTON --- */
        @keyframes move-in-out {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 139, 34, 0.4); }
            50% { transform: scale(1.06); box-shadow: 0 0 25px 5px rgba(34, 139, 34, 0.2); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 139, 34, 0); }
        }
        .tg-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: linear-gradient(90deg, #2e7d32 0%, #c62828 100%);
          color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 35px;
            /* Animation Trigger */
            animation: move-in-out 1.5s infinite ease-in-out;
            cursor: pointer;
            border: none;
        }

        /* Features Section */
        .features-grid {
            border: 1px solid #333;
            border-radius: 18px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            padding: 22px 5px;
            margin-bottom: 40px;
            background: rgba(255,255,255,0.02);
        }

        .f-item i { font-size: 22px; margin-bottom: 8px; display: block; }
        .f-item span { font-size: 11px; color: #999; font-weight: 500; }

        .clr-green { color: #4caf50; }
        .clr-yellow { color: #ffcc00; }
        .clr-red { color: #ff4444; }

        /* Footer */
        .footer-info {
            font-size: 12px;
            color: #555;
            line-height: 1.8;
            letter-spacing: 0.5px;
        }

        .domain-link {
            display: block;
            margin-top: 25px;
            color: #444;
            text-decoration: none;
            font-size: 14px;
        }
